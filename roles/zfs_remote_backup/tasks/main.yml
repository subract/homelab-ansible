---
- name: Deploy systemd unit for ZFS remote backup
  tags: backup
  template:
    src: zfs-remote-backup.service.j2
    dest: /etc/systemd/system/zfs-remote-backup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy backup script
  tags: backup
  template:
    src: zfs-remote-backup.sh
    dest: /usr/local/bin/zfs-remote-backup.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy systemd timer for ZFS remote backup
  tags: backup
  ansible.builtin.copy:
    dest: /etc/systemd/system/zfs-remote-backup.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Daily ZFS remote backup at 2 AM

      [Timer]
      OnCalendar=*-*-* 02:00:00
      Persistent=true
      Unit=zfs-remote-backup.service

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable and start ZFS remote backup timer
  tags: backup
  ansible.builtin.systemd:
    name: zfs-remote-backup.timer
    enabled: true
    state: started
    daemon_reload: true
