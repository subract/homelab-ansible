networks:
  web:
  web_ext:

services:
  factorio:
    container_name: factorio
    image: factoriotools/factorio:stable
    restart: unless-stopped

    ports:
      - 34197:34197/udp
      - 27015:27015/tcp

    networks:
      - web
      - web_ext

    volumes:
      - "{{ app_root }}/games/factorio/delta_heavy:/factorio"

    environment:
      UPDATE_MODS_ON_START: true
      SAVE_NAME: Delta Heavy

    labels:
      traefik.enable: false
